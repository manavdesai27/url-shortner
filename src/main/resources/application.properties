# ================================
# PostgreSQL Config
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=postgres
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
# Keep SQL logs off by default; enable via 'debug-sql' Spring profile
spring.jpa.show-sql=false

# ================================
# Redis Config
# ================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Optional: Server Port
server.port=${PORT:8080}

spring.output.ansi.enabled=always

# ================================
# Proxy/Forwarded headers (Render/Proxies)
# ================================
server.forward-headers-strategy=native

# ================================
# CORS + JWT + Cookie defaults (override in env for production)
# ================================
app.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.cookie.same-site=Lax
app.cookie.secure=false
app.jwt.expiration-ms=86400000
# New split expirations for access/refresh (used by JwtUtil)
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=1209600000
# app.jwt.secret=define-in-env (required in prod)

